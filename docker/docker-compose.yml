services:
  api:
    profiles: ['app']
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - '8000:8000'
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://concierge:concierge_dev@postgres:5432/concierge_os
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: concierge-os
      SECRET_KEY: change-me-in-production-use-a-long-random-string
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080,http://localhost:1420
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - concierge-net

  web:
    profiles: ['app']
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - concierge-net

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: concierge_dev
      POSTGRES_DB: concierge_os
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U concierge -d concierge_os']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - concierge-net

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - concierge-net

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
      - ./minio/init.sh:/docker-entrypoint-init.d/init.sh
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - concierge-net

volumes:
  pgdata:
  minio_data:

networks:
  concierge-net:
    driver: bridge
