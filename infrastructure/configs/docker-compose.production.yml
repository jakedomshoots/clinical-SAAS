version: '3.8'

services:
  api:
    image: concierge-os/api:latest
    container_name: concierge-os-api
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - SECRET_KEY=${SECRET_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - AUTO_CREATE_SCHEMA=false
      - ALLOW_SEED_ENDPOINT=false
      - LOG_LEVEL=info
      - CORS_ORIGINS=${CORS_ORIGINS}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    networks:
      - concierge-os
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '5'

  web:
    image: concierge-os/web:latest
    container_name: concierge-os-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=https://api.concierge-os.example.com
    depends_on:
      - api
    networks:
      - concierge-os

  nginx:
    image: nginx:alpine
    container_name: concierge-os-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - concierge-os

  redis:
    image: redis:7-alpine
    container_name: concierge-os-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - concierge-os

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: concierge-os-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - concierge-os

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: concierge-os-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - concierge-os

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  concierge-os:
    driver: bridge
